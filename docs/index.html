<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoria 文档中心</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ═══════════════════════════════════════════════
   Dracula — 官方配色（memoria 主题同款）
   Peach  — 蜜桃明亮配色
═══════════════════════════════════════════════ */

/* --- Dracula (Dark) --- */
:root, [data-theme="dracula"] {
  --dracula-background:    #282a36;
  --dracula-current-line:  #44475a;
  --dracula-foreground:    #f8f8f2;
  --dracula-comment:       #6272a4;
  --dracula-cyan:          #8be9fd;
  --dracula-green:         #50fa7b;
  --dracula-orange:        #ffb86c;
  --dracula-pink:          #ff79c6;
  --dracula-purple:        #bd93f9;
  --dracula-red:           #ff5555;
  --dracula-yellow:        #f1fa8c;

  --bg:           var(--dracula-background);
  --bg-sidebar:   #21222c;
  --bg-content:   var(--dracula-background);
  --surface:      var(--dracula-current-line);
  --text:         var(--dracula-foreground);
  --text-muted:   var(--dracula-comment);
  --accent:       var(--dracula-purple);
  --accent-warm:  var(--dracula-orange);
  --accent-cool:  var(--dracula-cyan);
  --accent-pink:  var(--dracula-pink);
  --accent-green: var(--dracula-green);
  --accent-red:   var(--dracula-red);
  --heading:      var(--dracula-yellow);
  --border:       var(--dracula-current-line);
  --link:         var(--dracula-cyan);
  --code-bg:      #1e1f29;
  --hover-bg:      rgba(68, 71, 90, 0.5);
  --nav-bg:       rgba(33, 34, 44, 0.97);
}

/* --- Peach (Light) --- */
[data-theme="peach"] {
  --bg:           #fef9f3;
  --bg-sidebar:   #fdf3eb;
  --bg-content:   #fffaf5;
  --surface:      #f5e6d3;
  --text:         #2d2a2e;
  --text-muted:   #a0896e;
  --accent:       #e8653b;
  --accent-warm:  #c9562a;
  --accent-cool:  #4a90a4;
  --accent-pink:  #d4621b;
  --accent-green: #3a9d6e;
  --accent-red:   #c0392b;
  --heading:      #e8653b;
  --border:       #e8d9c5;
  --link:         #d4621b;
  --code-bg:      #f0e0cc;
  --hover-bg:     rgba(232, 216, 197, 0.6);
  --nav-bg:       rgba(253, 243, 235, 0.97);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background 0.2s, color 0.2s;
}

/* ── Header ── */
header {
  background: var(--bg-sidebar);
  color: var(--text);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
  z-index: 100;
}

header .brand {
  font-size: 1.1rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
header .brand span { opacity: 0.65; font-size: 0.8rem; font-weight: 400; }

header nav { display: flex; align-items: center; gap: 14px; }
header nav a { color: var(--text); text-decoration: none; font-size: 0.87rem; opacity: 0.8; }
header nav a:hover { opacity: 1; text-decoration: underline; }



/* ── Mobile hamburger ── */
.hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  color: var(--text);
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--text);
  margin: 5px 0;
  border-radius: 2px;
  transition: all 0.2s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -5px); }

/* ── Layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s, transform 0.25s;
}

.sidebar h3 {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-muted);
  padding: 14px 16px 8px;
  border-bottom: 1px solid var(--border);
  transition: border-color 0.2s;
}

.sidebar ul { list-style: none; padding: 6px 0; }
.sidebar li a {
  display: block;
  padding: 8px 16px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.88rem;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.sidebar li a:hover {
  background: var(--hover-bg);
  color: var(--accent);
  border-left-color: var(--accent);
}
.sidebar li a.active {
  background: var(--hover-bg);
  color: var(--accent);
  font-weight: 500;
  border-left-color: var(--accent);
}

/* ── Content ── */
.content { flex: 1; overflow-y: auto; background: var(--bg-content); }
.doc {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 50px;
  line-height: 1.75;
  color: var(--text);
}

/* ── Markdown 渲染 ── */
.doc h1 {
  font-size: 1.8rem; margin-bottom: 16px;
  padding-bottom: 12px; border-bottom: 2px solid var(--border);
  color: var(--heading);
}
.doc h2 { font-size: 1.3rem; margin: 30px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); color: var(--text); }
.doc h3 { font-size: 1.1rem; margin: 22px 0 8px; color: var(--text); }
.doc p { margin: 12px 0; }
.doc ul, .doc ol { margin: 12px 0; padding-left: 24px; }
.doc li { margin: 6px 0; }
.doc code {
  background: var(--code-bg); padding: 2px 7px;
  border-radius: 4px; font-size: 0.87em;
  font-family: 'SFMono-Regular', Consolas, monospace;
}
.doc pre {
  background: var(--code-bg); padding: 16px;
  border-radius: 8px; overflow-x: auto; margin: 16px 0;
}
.doc pre code { background: none; border: none; padding: 0; font-size: 0.85em; }
.doc blockquote {
  border-left: 4px solid var(--accent); padding: 8px 16px;
  margin: 16px 0; background: var(--surface); opacity: 0.85;
  border-radius: 0 6px 6px 0;
}
.doc table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.9rem; }
.doc th { background: var(--surface); text-align: left; padding: 10px 12px; border: 1px solid var(--border); font-weight: 600; }
.doc td { padding: 8px 12px; border: 1px solid var(--border); }
.doc a { color: var(--link); text-decoration: none; }
.doc a:hover { text-decoration: underline; }
.doc strong { color: var(--heading); font-weight: 600; }
.doc img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
.doc hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

.welcome { text-align: center; padding: 100px 20px; color: var(--text-muted); }
.welcome h2 { font-size: 1.5rem; color: var(--heading); margin-bottom: 12px; }

/* ── Mobile ── */
@media (max-width: 700px) {
  .hamburger { display: block; }

  .sidebar {
    position: fixed;
    top: 49px; left: 0; bottom: 0;
    width: 260px;
    z-index: 99;
    transform: translateX(-100%);
    box-shadow: 4px 0 20px rgba(0,0,0,0.3);
  }
  .sidebar.open { transform: translateX(0); }

  .overlay {
    display: block;
    position: fixed;
    top: 49px; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 98;
  }

  .doc { padding: 24px 18px; }
  .doc h1 { font-size: 1.4rem; }
}
</style>
</head>
<body data-theme="dracula">

<!-- Mobile overlay -->
<div class="overlay" id="overlay" style="display:none" onclick="toggleSidebar()"></div>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <div class="brand">📚 Memoria 文档 <span>/ 文档中心</span></div>
  </div>
  <nav>
    <button id="theme-toggle-btn" onclick="toggleTheme()" title="切换主题">☀️</button>
    <a href="https://github.com/AllenTango/memoria" target="_blank">GitHub</a>
  </nav>
</header>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <h3>📖 文档列表</h3>
    <ul id="nav-list"></ul>
  </aside>
  <main class="content">
    <div id="doc-container" class="doc"></div>
  </main>
</div>

<script>
const docs = [
  { file: 'getting-started.md',  title: '新手入门' },
  { file: 'content-guide.md',    title: '内容格式说明' },
  { file: 'cli.md',              title: 'CLI 快捷命令' },
  { file: 'cli-reference.md',   title: 'CLI 命令参考' },
  { file: 'theme-guide.md',      title: '主题开发指南' },
  { file: 'deploy-guide.md',     title: '部署指南' },
  { file: 'architecture.md',      title: '架构设计' },
  { file: 'developer.md',        title: '开发者文档' },
  { file: 'testing.md',         title: '测试指南' },
];

function setTheme(theme) {
  document.body.dataset.theme = theme;
  localStorage.setItem('memoria-docs-theme', theme);
  updateToggleBtn();
}

function updateToggleBtn() {
  const btn = document.getElementById('theme-toggle-btn');
  const current = document.body.dataset.theme;
  if (current === 'peach') {
    btn.textContent = '🌙';
    btn.title = '切换暗黑模式';
  } else {
    btn.textContent = '☀️';
    btn.title = '切换明亮模式';
  }
}

function toggleTheme() {
  const current = document.body.dataset.theme;
  setTheme(current === 'peach' ? 'dracula' : 'peach');
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const hamburger = document.getElementById('hamburger');
  const overlay = document.getElementById('overlay');
  sidebar.classList.toggle('open');
  hamburger.classList.toggle('open');
  overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('overlay').style.display = 'none';
}

// Build nav
const navList = document.getElementById('nav-list');
docs.forEach(({ file, title }) => {
  const li = document.createElement('li');
  li.innerHTML = `<a href="#" data-file="${file}">${title}</a>`;
  navList.appendChild(li);
});

navList.addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  e.preventDefault();
  loadDoc(a.dataset.file);
  document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
  a.classList.add('active');
  closeSidebar();
});

async function loadDoc(file) {
  const container = document.getElementById('doc-container');
  try {
    const res = await fetch(file);
    if (!res.ok) { container.innerHTML = '<p>加载失败</p>'; return; }
    container.innerHTML = marked.parse(await res.text());
    window.scrollTo(0, 0);
  } catch (err) {
    container.innerHTML = `<p>加载失败: ${err.message}</p>`;
  }
}

function showWelcome() {
  document.getElementById('doc-container').innerHTML = `
    <div class="welcome">
      <h2>📚 Memoria 文档中心</h2>
      <p>从左侧列表选择文档开始阅读</p>
    </div>
  `;
  document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
}

const saved = localStorage.getItem('memoria-docs-theme');
if (saved) { setTheme(saved); }
showWelcome();
</script>
</body>
</html>
