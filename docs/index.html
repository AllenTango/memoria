<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoria 文档中心</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f6f8fa; color: #24292f; height: 100vh; display: flex; flex-direction: column; }
header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header .brand { font-size: 1.2rem; font-weight: 600; }
header .brand span { opacity: 0.85; font-size: 0.85rem; font-weight: 400; }
header nav a { color: white; text-decoration: none; margin-left: 20px; opacity: 0.9; font-size: 0.9rem; }
header nav a:hover { opacity: 1; text-decoration: underline; }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 260px; background: white; border-right: 1px solid #eaecef; overflow-y: auto; flex-shrink: 0; }
.sidebar h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #57606a; padding: 16px 16px 8px; border-bottom: 1px solid #eaecef; }
.sidebar ul { list-style: none; padding: 8px 0; }
.sidebar li a { display: block; padding: 8px 16px; color: #24292f; text-decoration: none; font-size: 0.9rem; border-left: 3px solid transparent; transition: all 0.15s; }
.sidebar li a:hover { background: #f6f8fa; color: #0969da; border-left-color: #0969da; }
.sidebar li a.active { background: #f6f8fa; color: #0969da; font-weight: 500; border-left-color: #0969da; }
.content { flex: 1; overflow-y: auto; padding: 40px 60px; background: white; }
.doc { max-width: 800px; margin: 0 auto; line-height: 1.7; }
.doc h1 { font-size: 1.8rem; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #eaecef; }
.doc h2 { font-size: 1.3rem; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #eaecef; }
.doc h3 { font-size: 1.1rem; margin: 20px 0 8px; }
.doc p { margin: 12px 0; }
.doc ul, .doc ol { margin: 12px 0; padding-left: 24px; }
.doc li { margin: 6px 0; }
.doc code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-size: 0.88em; font-family: 'SFMono-Regular', Consolas, monospace; border: 1px solid #eaecef; }
.doc pre { background: #f6f8fa; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0; border: 1px solid #eaecef; }
.doc pre code { background: none; border: none; padding: 0; font-size: 0.85em; }
.doc blockquote { border-left: 4px solid #0969da; padding: 8px 16px; margin: 16px 0; background: #f6f8fa; color: #57606a; }
.doc table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.9rem; }
.doc th { background: #f6f8fa; text-align: left; padding: 10px 12px; border: 1px solid #eaecef; font-weight: 600; }
.doc td { padding: 8px 12px; border: 1px solid #eaecef; }
.doc tr:hover td { background: #f6f8fa; }
.doc a { color: #0969da; text-decoration: none; }
.doc a:hover { text-decoration: underline; }
.doc strong { font-weight: 600; }
.doc img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
.welcome { text-align: center; padding: 80px 20px; color: #57606a; }
.welcome h2 { font-size: 1.5rem; color: #24292f; margin-bottom: 12px; }
.welcome p { font-size: 1rem; }
@media (max-width: 700px) { .sidebar { display: none; } .content { padding: 20px; } }
</style>
</head>
<body>

<header>
  <div class="brand">📚 Memoria 文档 <span>/ 文档中心</span></div>
  <nav>
    <a href="https://github.com/AllenTango/memoria" target="_blank">GitHub</a>
    <a href="https://allentango.github.io/memoria/" onclick="showWelcome()">首页</a>
  </nav>
</header>

<div class="main">
  <aside class="sidebar">
    <h3>📖 文档列表</h3>
    <ul id="nav-list"></ul>
  </aside>
  <main class="content">
    <div id="doc-container" class="doc"></div>
  </main>
</div>

<script>
const docs = [
  'getting-started.md',
  'content-guide.md',
  'cli.md',
  'cli-reference.md',
  'theme-guide.md',
  'deploy-guide.md',
  'testing.md'
];

const navList = document.getElementById('nav-list');
const container = document.getElementById('doc-container');

docs.forEach(file => {
  const name = file.replace('.md','').replace(/-/g,' ');
  const title = name.charAt(0).toUpperCase() + name.slice(1);
  const li = document.createElement('li');
  li.innerHTML = `<a href="#" data-file="${file}">${title}</a>`;
  navList.appendChild(li);
});

navList.addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  e.preventDefault();
  const file = a.dataset.file;
  loadDoc(file);

  document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
  a.classList.add('active');
});

async function loadDoc(file) {
  try {
    const res = await fetch(file);
    if (!res.ok) { container.innerHTML = '<p>加载失败</p>'; return; }
    const text = await res.text();
    container.innerHTML = marked.parse(text);
    window.scrollTo(0, 0);
  } catch (err) {
    container.innerHTML = `<p>加载失败: ${err.message}</p>`;
  }
}

function showWelcome() {
  container.innerHTML = `
    <div class="welcome">
      <h2>📚 Memoria 文档中心</h2>
      <p>从左侧列表选择文档开始阅读</p>
    </div>
  `;
  document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
}

// 默认显示欢迎页
showWelcome();
</script>
</body>
</html>
