name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  build-all-themes:
    name: Build All Themes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all themes and package
        run: |
          mkdir -p dist-themes
          for theme in dracula nord peach mint; do
            echo "Building theme: $theme"
            node src/index.js --theme "$theme"
            zip -r "dist-themes/memoria-$theme.zip" dist/
            echo "✅ Built memoria-$theme.zip"
          done

      - name: Upload theme packages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-themes/

  deploy:
    name: Deploy to GitHub Pages
    needs: [build, build-all-themes]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4